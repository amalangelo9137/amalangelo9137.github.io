<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads - MICRO </title>

    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .download-zone {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 30px;
            width: 100%;
        }

        /* Large Platform Action Cards */
        .platform-btn {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 22px;
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

            .platform-btn:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
                border-color: rgba(255, 255, 255, 0.4);
            }

        /* Custom Platform Color Identification Beats */
        .btn-github {
            background: rgba(36, 41, 47, 0.6);
            backdrop-filter: blur(5px);
        }

            .btn-github:hover {
                background: rgba(36, 41, 47, 0.85);
            }

        .btn-gamejolt {
            background: rgba(47, 183, 98, 0.4);
            backdrop-filter: blur(5px);
        }

            .btn-gamejolt:hover {
                background: rgba(47, 183, 98, 0.65);
            }

        .platform-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            width: 60px;
            height: 60px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .platform-details {
            flex-grow: 1;
        }

            .platform-details h3 {
                font-family: 'Bangers', cursive;
                font-size: 2.1rem;
                letter-spacing: 1.5px;
                margin-bottom: 2px;
                color: #fff !important; /* Force override signature yellow text if needed */
            }

            .platform-details p {
                font-size: 1rem;
                opacity: 0.85;
                line-height: 1.4;
            }

        .arrow-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0.7;
            transition: transform 0.2s ease;
            margin-right: 10px;
        }

        .platform-btn:hover .arrow-indicator {
            transform: translateX(5px);
            opacity: 1;
        }

        /* Alternative Secondary Mirrors Listing Section */
        .mirrors-section {
            margin-top: 35px;
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

            .mirrors-section h4 {
                font-family: 'Bangers', cursive;
                font-size: 1.8rem;
                letter-spacing: 1px;
                color: #ffeaa7;
                margin-bottom: 15px;
            }

        .mirrors-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            list-style: none;
        }

        .mirror-link {
            display: block;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

            .mirror-link:hover {
                background: rgba(255, 255, 255, 0.2);
            }
    </style>
</head>
<body>

    <header class="toolbar">
        <div class="logo" onclick="location.href='index.html'">
            <img src="images/logo.png" alt="Logo" width="100" height="85" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';">
            <span id="logo-text" style="display: none;">🌿 MySpace</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><button onclick="location.href='../../../index.html'">Home</button></li>
                <li><button onclick="location.href='../../../index.html?view=projects'">Projects</button></li>
                <li><button onclick="location.href='../../../index.html?view=about'">About</button></li>
            </ul>
        </nav>
    </header>

    <main class="view active">
        <div class="glass-panel blur-heavy">
            <button class="back-btn" onclick="history.back()">⬅ Back to Showcase</button>

            <h2>Downloads</h2>
            <p class="subtitle-text">Get the latest compiled application binaries and release notes here;</p>

            <div class="download-zone">

                <a href="https://github.com/amalangelo9137/Windroid-Real-Life-Simulator/releases" target="_blank" class="platform-btn btn-github">
                    <div class="platform-icon">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor">

                        </svg>
                    </div>
                    <div class="platform-details">
                        <h3>GitHub</h3>
                        <p>See the latest compiled application binaries and release notes. Not open source until we have some contributors.</p>
                    </div>
                    <div class="arrow-indicator">➜</div>
                </a>

                <a href="https://gamejolt.com/games/wdsimMICRO/1075586" target="_blank" class="platform-btn btn-gamejolt">
                    <div class="platform-icon">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor">
                            <path d="M2 2h20v4H2V2zm0 7h20v4H2V9zm0 7h14v4H2v-4z" />

                    <div class="platform-details">

                    </div>
                    <div class="arrow-indicator">➜</div>
                </a>

            </div>
        </div>
    </main>

</body>
</html>
